<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>CACJSA</title>
        <link rel="stylesheet" href="stilos.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    </head>
    <body>
    <header>
        <nav class="barra">
            <ul>
                <li> <a href="">Sobre Nosotros</a></li>
                <li><a href="">Contactenos</a></li>
            </ul>
            <div class="redes">
                <a href="">Facebook</a>
                <a href="">whatsaap</a>
            </div>
        </nav>
            <div class="contenedor">
                <div class="logo">
                    <img src="CURSITO/imagen/logo.png" alt="Cooperatia Agraria Cafetalera Juan Santos Atahualpa">
                    <span>Por una nueva historia</span>
                </div>
                <nav class ="subcontenedor">
                    <ul>
                        <li><a href="">Sobre Nosotros</a></li>
                        <li><a href="">Proyectos</a></li>
                        <li><a href="">Innovación</a></li>
                        <li><a href="">Servicios</a></li>
                    </ul>
                </nav>
                <select class="language">
                    <option>ESPAÑOL</option>
                    <option>INGLES</option>
                    <option>PORTUGUES</option>
                </select>
            </div>
            <section class="principal">
                <div id="carouselPrincipal" class="carousel slide" data-bs-ride="true" data-bs-pause="false">
                    <div class="carousel-inner">
                        <div class="carousel-item active">
                            <div class="slide-bg" style="background-image: url(CURSITO/imagen/asamblea.jpg);"></div>
                        </div>
                        <div class="carousel-item">
                            <div class="slide-bg" style="background-image: url(CURSITO/imagen/socio.jpg);"></div>
                        </div>
                        <div class="carousel-item">
                            <div class="slide-bg" style="background-image: url(CURSITO/imagen/alex.jpg); background-position: bottom;"></div>
                        </div>
                    </div>
                </div>
                <div class="principal-content">
                    <p>Cooperatia Agraria Cafetalera</p>
                    <h1>Juan Santos Atahualpa</h1>
                    <button class="boton">CONOCENOS</button>
                </div>
            </section>
            <section class="triovalor">
                <h2 class="frase">Nuestra Fórmula de Café Orgáncio</h2>
            </section>
    </header>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var myCarousel = document.querySelector('#carouselPrincipal');
            var carousel = new bootstrap.Carousel(myCarousel, {
                interval: 5000, // 5 segundos
                ride: 'carousel'
            });
        });
    </script>
    </body>
</html>
