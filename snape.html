<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de la Serpiente - JavaScript</title>
    
    <style>
        /* --- ESTILOS CSS --- */
        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #282c34;
            color: #e0e0e0;
            margin: 0;
        }

        h1 {
            color: #61dafb;
            margin-bottom: 20px;
        }

        canvas {
            background-color: #3a3f4a;
            border: 5px solid #61dafb;
            display: block;
            box-shadow: 0 0 20px rgba(97, 218, 251, 0.5);
        }

        p {
            font-size: 1.2em;
            margin-top: 15px;
        }

        #score {
            font-weight: bold;
            color: #ffcc00;
        }

        #startButton {
            background-color: #4CAF50; /* Verde */
            border: none;
            color: white;
            padding: 15px 32px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 10px 0;
            cursor: pointer;
            border-radius: 8px;
            transition: background-color 0.3s ease;
        }

        #startButton:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <h1>🐍 ¡Juego de la Serpiente! 🍎</h1>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <p>Puntuación: <span id="score">0</span></p>
    <button id="startButton">Iniciar Juego</button>

    <script>
        // --- LÓGICA JAVASCRIPT ---
        
        // Obtener el canvas y su contexto de dibujo
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Obtener elementos HTML para la puntuación y el botón
        const scoreDisplay = document.getElementById('score');
        const startButton = document.getElementById('startButton');

        // Tamaño de cada "cuadro" del juego
        const gridSize = 20; // 20px por cuadro
        const canvasSize = canvas.width; // 400px

        // Variables del juego
        let snake;
        let food;
        let dx = gridSize; // Velocidad x (movimiento horizontal)
        let dy = 0;        // Velocidad y (movimiento vertical)
        let score;
        let gameInterval;
        let gameSpeed = 150; // Velocidad del juego en ms (menor = más rápido)
        let changingDirection = false; // Para evitar movimientos inversos rápidos

        // --- Inicialización del Juego ---
        function initGame() {
            // La serpiente comienza con 3 segmentos
            snake = [
                { x: 10 * gridSize, y: 10 * gridSize }, // Cabeza
                { x: 9 * gridSize, y: 10 * gridSize },
                { x: 8 * gridSize, y: 10 * gridSize }
            ];
            
            food = generateFood();
            dx = gridSize; // Dirección inicial: derecha
            dy = 0;
            score = 0;
            scoreDisplay.textContent = score;
            changingDirection = false;

            // Detener cualquier intervalo de juego anterior
            if (gameInterval) {
                clearInterval(gameInterval);
            }
            
            // Iniciar el bucle principal del juego
            gameInterval = setInterval(gameLoop, gameSpeed);
        }

        // --- Bucle Principal del Juego ---
        function gameLoop() {
            changingDirection = false; // Permitir el cambio de dirección para el próximo frame

            if (checkCollision()) {
                clearInterval(gameInterval); // Detener el juego
                alert('¡Juego Terminado! Puntuación: ' + score);
                startButton.textContent = "Volver a Jugar";
                startButton.style.display = 'block'; // Mostrar botón para reiniciar
                return;
            }

            clearCanvas();
            drawFood();
            moveSnake();
            drawSnake();
        }

        // --- Funciones de Dibujo ---
        function clearCanvas() {
            ctx.fillStyle = '#3a3f4a'; // Color de fondo del canvas
            ctx.fillRect(0, 0, canvasSize, canvasSize);
        }

        function drawSnakePart(snakePart) {
            ctx.fillStyle = '#00ff00'; // Color de la serpiente (verde)
            ctx.strokeStyle = '#008000'; // Borde de la serpiente (verde oscuro)
            ctx.fillRect(snakePart.x, snakePart.y, gridSize, gridSize);
            ctx.strokeRect(snakePart.x, snakePart.y, gridSize, gridSize);
        }

        function drawSnake() {
            snake.forEach(drawSnakePart);
        }

        function drawFood() {
            ctx.fillStyle = 'red'; // Color de la manzana
            ctx.strokeStyle = 'darkred';
            ctx.fillRect(food.x, food.y, gridSize, gridSize);
            ctx.strokeRect(food.x, food.y, gridSize, gridSize);
        }

        // --- Lógica del Juego ---
        function moveSnake() {
            // Crear la nueva cabeza de la serpiente
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // Añadir la nueva cabeza al principio del array
            snake.unshift(head);

            // Verificar si la serpiente comió la comida
            const didEatFood = head.x === food.x && head.y === food.y;
            if (didEatFood) {
                score += 10;
                scoreDisplay.textContent = score;
                food = generateFood(); // Generar nueva comida
            } else {
                // Si no comió, remover el último segmento para que la serpiente se mueva
                snake.pop();
            }
        }

        // Genera una posición aleatoria para la comida
        function generateFood() {
            let newFoodX, newFoodY;
            let collisionWithSnake;

            do {
                // Calcular coordenadas aleatorias dentro de los límites del canvas
                newFoodX = Math.floor(Math.random() * (canvasSize / gridSize)) * gridSize;
                newFoodY = Math.floor(Math.random() * (canvasSize / gridSize)) * gridSize;

                // Verificar si la nueva comida colisiona con la serpiente
                collisionWithSnake = snake.some(part => part.x === newFoodX && part.y === newFoodY);

            } while (collisionWithSnake); // Repetir si hay colisión

            return { x: newFoodX, y: newFoodY };
        }

        // Comprueba si la serpiente choca consigo misma o con los bordes
        function checkCollision() {
            // Chocar con su propio cuerpo (empezar desde el 4to segmento para evitar colisión con la cabeza)
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }

            // Chocar con los bordes
            const hitLeftWall = snake[0].x < 0;
            const hitRightWall = snake[0].x >= canvasSize;
            const hitTopWall = snake[0].y < 0;
            const hitBottomWall = snake[0].y >= canvasSize;

            return hitLeftWall || hitRightWall || hitTopWall || hitBottomWall;
        }

        // --- Control de Dirección ---
        function changeDirection(event) {
            // Si ya estamos cambiando de dirección en este frame, ignorar
            if (changingDirection) return;
            changingDirection = true;

            const keyPressed = event.keyCode;
            const LEFT_KEY = 37;
            const RIGHT_KEY = 39;
            const UP_KEY = 38;
            const DOWN_KEY = 40;

            const goingUp = dy === -gridSize;
            const goingDown = dy === gridSize;
            const goingRight = dx === gridSize;
            const goingLeft = dx === -gridSize;

            if (keyPressed === LEFT_KEY && !goingRight) {
                dx = -gridSize;
                dy = 0;
            }
            if (keyPressed === UP_KEY && !goingDown) {
                dx = 0;
                dy = -gridSize;
            }
            if (keyPressed === RIGHT_KEY && !goingLeft) {
                dx = gridSize;
                dy = 0;
            }
            if (keyPressed === DOWN_KEY && !goingUp) {
                dx = 0;
                dy = gridSize;
            }
        }

        // --- Event Listeners ---
        document.addEventListener('keydown', changeDirection);
        startButton.addEventListener('click', () => {
            startButton.style.display = 'none'; // Ocultar botón al iniciar
            initGame();
        });

        // Inicializar el canvas en blanco al cargar la página y mostrar el botón
        window.onload = () => {
            clearCanvas();
            startButton.style.display = 'block';
        };
    </script>
</body>
</html>
